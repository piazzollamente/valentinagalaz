<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Valentina Galaz</title>
  <meta name="description" content="Valentina Galaz — investigación, interpretación, Piazzollamente y Escuela de Flautistas.">
  <link rel="canonical" href="https://valentinagalaz.cl/">
  <style>
    :root{
      --white:#ffffff;
      --blue:#162a52;
      --green:#18b368;
      --fuchsia:#e63aa7;
      --ease:cubic-bezier(.2,.75,.25,1);
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--white);font-family:Arial,Helvetica,sans-serif;color:var(--blue)}
    body{min-height:100dvh}
    a{color:inherit}
    .home{position:fixed;inset:0;min-height:100dvh;display:grid;grid-template-columns:minmax(430px,47vw) minmax(0,1fr);overflow:hidden;background:var(--white)}
    .frame{position:absolute;inset:16px;border:2px solid var(--blue);pointer-events:none;z-index:20}

    .identity{position:relative;z-index:4;display:flex;flex-direction:column;min-width:0;min-height:0;padding:clamp(38px,5vh,68px) clamp(42px,5vw,78px) clamp(30px,4vh,54px);background:var(--white)}
    .logo-safe{position:relative;width:min(100%,680px);height:clamp(170px,22vh,220px);margin:0 0 8px 0;overflow:hidden;opacity:0;transform:translateY(-12px);animation:in .8s var(--ease) .05s forwards}
    .logo-safe img{position:absolute;left:50%;top:50%;display:block;width:100%;height:auto;max-width:none;max-height:none;transform:translate(-50%,-50%) scale(1.55);transform-origin:center}
    .role{margin:2px 8px 0;font-size:clamp(.62rem,.72vw,.8rem);line-height:1.5;letter-spacing:.17em;text-transform:uppercase;font-weight:700;opacity:0;animation:in .7s var(--ease) .24s forwards}
    .role:before{content:"";display:inline-block;width:34px;height:4px;background:var(--fuchsia);margin-right:12px;vertical-align:middle}
    .nav-title{margin-top:auto;margin-bottom:14px;font-size:.62rem;letter-spacing:.21em;text-transform:uppercase;font-weight:800;opacity:.62}

    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;width:min(100%,560px)}
    .card{position:relative;min-height:clamp(105px,15vh,148px);padding:18px;overflow:hidden;text-decoration:none;color:white;background:var(--blue);border:2px solid var(--blue);opacity:0;transform:translateY(18px);animation:cardIn .65s var(--ease) forwards;transition:transform .35s var(--ease),box-shadow .35s var(--ease),filter .35s var(--ease)}
    .card:nth-child(1){animation-delay:.36s}.card:nth-child(2){animation-delay:.46s}.card:nth-child(3){animation-delay:.56s}.card:nth-child(4){animation-delay:.66s}
    .card.green{background:var(--green)}
    .card.fuchsia{background:var(--fuchsia)}
    .card.white{background:var(--white);color:var(--blue)}
    .card:before{content:"";position:absolute;width:92px;aspect-ratio:1;border:2px solid currentColor;border-radius:50%;right:-40px;top:-45px;opacity:.35;transition:transform .45s var(--ease)}
    .card:after{content:"";position:absolute;width:54px;height:54px;right:-18px;bottom:-18px;background:rgba(255,255,255,.2);transform:rotate(45deg);transition:transform .45s var(--ease)}
    .card:hover,.card:focus-visible{transform:translateY(-5px);filter:saturate(1.08);box-shadow:10px 10px 0 rgba(22,42,82,.18);outline:none;z-index:3}
    .card:hover:before,.card:focus-visible:before{transform:translate(-22px,20px) scale(1.1)}
    .card:hover:after,.card:focus-visible:after{transform:translate(-18px,-12px) rotate(0)}
    .card-top{position:relative;z-index:2;display:flex;justify-content:space-between;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;font-weight:800;opacity:.82}
    .card h2{position:absolute;z-index:2;left:18px;right:18px;bottom:16px;margin:0;font-size:clamp(.95rem,1.35vw,1.34rem);line-height:.94;letter-spacing:-.03em;text-transform:uppercase}

    .portrait-panel{position:relative;min-width:0;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:clamp(48px,6vh,82px) clamp(42px,5vw,82px);background:var(--white)}
    .portrait-frame{position:relative;z-index:2;width:min(78%,700px);height:min(calc(100dvh - clamp(96px,12vh,164px)),850px);min-height:430px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;background:var(--white);border:2px solid var(--blue);box-shadow:clamp(12px,1.6vw,22px) clamp(12px,1.6vw,22px) 0 var(--fuchsia);opacity:0;transform:translateY(24px);animation:frameIn .95s var(--ease) .12s forwards}
    .portrait-frame:after{content:"";position:absolute;inset:14px;border:1px solid rgba(22,42,82,.16);z-index:3;pointer-events:none}
    .portrait-frame picture{display:flex;align-items:flex-end;justify-content:center;width:100%;height:100%}
    .portrait{display:block;width:auto;height:auto;max-width:100%;max-height:100%;object-fit:contain;object-position:center bottom;animation:photoSettle 1.2s var(--ease) .14s both}
    .shape{position:absolute;z-index:3;pointer-events:none}
    .shape.fuchsia{width:clamp(90px,11vw,166px);aspect-ratio:1;background:var(--fuchsia);right:-4%;top:9%;border-radius:50% 0 50% 50%;opacity:.95}
    .shape.green{width:clamp(78px,9vw,134px);aspect-ratio:1;background:var(--green);left:2%;bottom:-3%;border-radius:50% 50% 0 50%;opacity:.96}
    .vertical{position:absolute;z-index:4;right:21px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;color:var(--blue);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;font-weight:800}

    @keyframes in{to{opacity:1;transform:none}}
    @keyframes cardIn{to{opacity:1;transform:none}}
    @keyframes frameIn{to{opacity:1;transform:none}}
    @keyframes photoSettle{from{transform:scale(.985)}to{transform:scale(1)}}

    @media(max-width:940px){
      .home{grid-template-columns:minmax(380px,49vw) minmax(0,1fr)}
      .identity{padding-left:32px;padding-right:32px}
      .logo-safe{height:clamp(155px,21vh,205px)}
      .logo-safe img{transform:translate(-50%,-50%) scale(1.45)}
      .portrait-panel{padding-left:30px;padding-right:42px}
      .portrait-frame{width:88%}
    }

    @media(max-width:680px){
      html,body{overflow:auto;background:var(--white)}
      .home{position:relative;min-height:100svh;grid-template-columns:1fr;grid-template-rows:auto minmax(320px,44svh) auto;overflow:hidden;background:var(--white)}
      .frame{inset:8px}
      .identity{display:contents}
      .logo-safe{grid-row:1;align-self:center;width:calc(100% - 34px);max-width:560px;height:clamp(135px,20svh,180px);margin:10px auto 0;z-index:6}
      .logo-safe img{transform:translate(-50%,-50%) scale(1.35)}
      .role,.nav-title{display:none}
      .portrait-panel{grid-row:2;padding:12px 24px 14px;background:var(--white)}
      .portrait-frame{width:min(76vw,405px);height:100%;min-height:0;box-shadow:8px 8px 0 var(--fuchsia);background:var(--white)}
      .portrait-frame:after{inset:8px}
      .portrait{max-width:100%;max-height:100%;object-fit:contain;object-position:center bottom}
      .shape.fuchsia{width:68px;top:2%;right:-10px}
      .shape.green{width:60px;left:-10px;bottom:-7px}
      .vertical{display:none}
      .cards{grid-row:3;z-index:7;justify-self:center;width:min(calc(100% - 28px),520px);grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 0 20px;background:var(--white)}
      .card{min-height:110px;padding:13px}
      .card h2{left:13px;right:13px;bottom:12px;font-size:clamp(.78rem,3.7vw,1rem)}
      .card-top{font-size:.5rem}
    }

    @media(max-height:650px) and (min-width:681px){
      .identity{padding-top:24px;padding-bottom:22px}
      .logo-safe{height:130px;width:min(100%,620px)}
      .logo-safe img{transform:translate(-50%,-50%) scale(1.3)}
      .cards{gap:8px}
      .card{min-height:88px}
      .portrait-panel{padding-top:34px;padding-bottom:34px}
      .portrait-frame{height:calc(100dvh - 68px);min-height:0}
    }

    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}.logo-safe,.role,.card,.portrait-frame{opacity:1;transform:none}}
  </style>
</head>
<body>
  <main class="home">
    <div class="frame" aria-hidden="true"></div>

    <section class="identity" aria-label="Identidad y áreas de trabajo">
      <div class="logo-safe">
        <img src="assets/Fondo%20marfil.png" alt="Valentina Galaz" loading="eager" decoding="async">
      </div>

      <p class="role">Flautista · Investigadora · Directora artística</p>
      <div class="nav-title">Selecciona un área</div>

      <nav class="cards" aria-label="Áreas de trabajo">
        <a class="card" href="investigacion/">
          <span class="card-top"><span>01</span><span>→</span></span>
          <h2>Investigación</h2>
        </a>
        <a class="card green" href="interpretacion/">
          <span class="card-top"><span>02</span><span>→</span></span>
          <h2>Interpretación</h2>
        </a>
        <a class="card fuchsia" href="piazzollamente/">
          <span class="card-top"><span>03</span><span>→</span></span>
          <h2>Piazzollamente</h2>
        </a>
        <a class="card white" href="escuela-de-flautistas/">
          <span class="card-top"><span>04</span><span>→</span></span>
          <h2>Escuela de<br>Flautistas</h2>
        </a>
      </nav>
    </section>

    <section class="portrait-panel" aria-label="Retrato de Valentina Galaz">
      <div class="portrait-frame">
        <picture>
          <source srcset="assets/valentina-home.webp" type="image/webp">
          <img class="portrait" src="assets/ChatGPT%20Image%2030%20may%202026%2C%2013_55_32%20%281%29.png" alt="Valentina Galaz de cuerpo completo sosteniendo una flauta traversa" loading="eager" decoding="async" fetchpriority="high">
        </picture>
      </div>
      <span class="shape fuchsia" aria-hidden="true"></span>
      <span class="shape green" aria-hidden="true"></span>
      <span class="vertical">Valentina Galaz</span>
    </section>
  </main>
</body>
</html>
