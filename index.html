<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Valentina Galaz</title>
  <meta name="description" content="Valentina Galaz — investigación, interpretación, Piazzollamente y Escuela de Flautistas.">
  <link rel="canonical" href="https://valentinagalaz.cl/">
  <style>
    :root{--ivory:#fbf7e9;--blue:#09235b;--yellow:#dfa02e;--red:#c8322d;--green:#2f8587;--sand:#dec6aa;--ease:cubic-bezier(.2,.75,.25,1)}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--ivory);font-family:Arial,Helvetica,sans-serif;color:var(--blue)}
    body{min-height:100dvh}
    a{color:inherit}
    .home{position:fixed;inset:0;min-height:100dvh;display:grid;grid-template-columns:minmax(420px,46vw) minmax(0,1fr);overflow:hidden;background:var(--ivory)}
    .frame{position:absolute;inset:14px;border:2px solid var(--blue);pointer-events:none;z-index:20}
    .identity{position:relative;z-index:4;display:flex;flex-direction:column;min-width:0;min-height:0;padding:clamp(32px,4vh,54px) clamp(30px,4vw,64px) clamp(24px,3vh,42px)}
    .logo{width:min(100%,720px);max-height:clamp(110px,20vh,195px);overflow:visible;background:transparent;opacity:0;transform:translateY(-14px);clip-path:inset(0 100% 0 0);animation:logoIn .9s var(--ease) .05s forwards}
    .logo picture{display:block;width:100%;height:auto}
    .logo img{display:block;width:100%;height:auto;max-height:clamp(110px,20vh,195px);object-fit:contain;object-position:left center}
    .role{margin:14px 3px 0;font-size:clamp(.64rem,.75vw,.82rem);line-height:1.45;letter-spacing:.17em;text-transform:uppercase;font-weight:700;opacity:0;animation:in .7s var(--ease) .3s forwards}
    .role:before{content:"";display:inline-block;width:34px;height:3px;background:var(--red);margin-right:12px;vertical-align:middle}
    .nav-title{margin-top:clamp(38px,7vh,82px);margin-bottom:10px;font-size:.62rem;letter-spacing:.21em;text-transform:uppercase;font-weight:800;opacity:.65}
    .vln-nav{position:relative;width:min(100%,520px);height:min(39vh,360px);min-height:260px;margin-right:12px;opacity:0;transform:translateY(18px);animation:cardIn .7s var(--ease) .42s forwards}
    .vln-piece{position:absolute;display:block;text-decoration:none;outline:none;transition:transform .34s var(--ease),filter .34s var(--ease);z-index:2}
    .vln-piece:hover,.vln-piece:focus-visible{transform:translate(-4px,-4px);filter:saturate(1.08);z-index:8}
    .vln-piece span{position:absolute;display:block}
    .vln-piece .label{z-index:6;text-transform:uppercase;font-weight:800;letter-spacing:.12em;line-height:1.05}
    .v-shape{left:3%;top:4%;width:34%;height:88%;z-index:3}
    .v-shape .v-left,.v-shape .v-right{top:0;height:100%;width:55%;background:var(--yellow);filter:drop-shadow(5px 6px 0 rgba(200,50,45,.23)) drop-shadow(0 0 1px var(--blue))}
    .v-shape .v-left{left:0;clip-path:polygon(0 0,34% 0,100% 100%,66% 100%)}
    .v-shape .v-right{right:0;clip-path:polygon(66% 0,100% 0,34% 100%,0 100%)}
    .v-shape .label{left:10%;top:8%;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--blue);font-size:clamp(.62rem,.88vw,.84rem)}
    .l-shape{left:34%;top:24%;width:38%;height:54%;z-index:4}
    .l-shape .l-vertical{left:0;top:0;width:29%;height:100%;background:var(--red);border:2px solid var(--blue);box-shadow:8px 8px 0 rgba(47,133,135,.28)}
    .l-shape .l-horizontal{left:0;bottom:0;width:100%;height:29%;background:var(--red);border:2px solid var(--blue)}
    .l-shape .label{left:29%;right:11%;bottom:8%;color:var(--ivory);font-size:clamp(.55rem,.76vw,.74rem);white-space:nowrap;text-align:center}
    .n-blue{left:69%;top:11%;width:16%;height:72%;z-index:3}
    .n-blue .n-left{left:0;top:0;width:38%;height:100%;background:var(--blue);border:2px solid var(--blue);box-shadow:7px 7px 0 rgba(223,160,46,.38)}
    .n-blue .n-diagonal{left:20%;top:0;width:210%;height:100%;background:var(--blue);clip-path:polygon(0 0,18% 0,100% 100%,82% 100%);filter:drop-shadow(0 0 1px var(--blue))}
    .n-blue .label{left:2%;top:8%;bottom:8%;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--ivory);font-size:clamp(.46rem,.65vw,.62rem)}
    .n-green{left:84%;top:11%;width:13%;height:72%;z-index:5}
    .n-green .n-right{right:0;top:0;width:54%;height:100%;background:var(--green);border:2px solid var(--blue);box-shadow:7px 7px 0 rgba(200,50,45,.25)}
    .n-green .n-base{left:0;bottom:0;width:100%;height:18%;background:var(--green);border:2px solid var(--blue)}
    .n-green .label{right:9%;top:7%;bottom:7%;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--ivory);font-size:clamp(.44rem,.62vw,.59rem);text-align:center}
    .accent{position:absolute;z-index:1;pointer-events:none;border:2px solid var(--blue)}
    .circle-red{left:-1%;top:67%;width:9.5%;aspect-ratio:1;border-radius:50%;background:var(--red)}
    .circle-blue{left:55%;top:1%;width:10%;aspect-ratio:1;border-radius:50%;background:#2874bd}
    .portrait-panel{position:relative;min-width:0;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:clamp(42px,6vh,76px) clamp(34px,5vw,78px);background:linear-gradient(135deg,#f3ecdf 0%,var(--sand) 100%)}
    .portrait-panel:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--ivory) 0,rgba(251,247,233,.5) 8%,transparent 25%);z-index:1;pointer-events:none}
    .portrait-frame{position:relative;z-index:2;width:min(78%,690px);height:min(calc(100dvh - clamp(84px,12vh,152px)),820px);min-height:430px;overflow:hidden;background:#eadbc8;border:2px solid var(--blue);box-shadow:clamp(12px,1.6vw,22px) clamp(12px,1.6vw,22px) 0 var(--red);opacity:0;transform:translateY(26px) rotate(.4deg);animation:frameIn 1s var(--ease) .12s forwards}
    .portrait-frame:after{content:"";position:absolute;inset:14px;border:1px solid rgba(251,247,233,.78);z-index:3;pointer-events:none}
    .portrait-frame picture{display:block;width:100%;height:100%}
    .portrait{display:block;width:100%;height:100%;object-fit:cover;object-position:center 18%;transform:scale(1.035);animation:photoSettle 1.4s var(--ease) .14s both}
    .shape{position:absolute;z-index:3;pointer-events:none}.shape.red{width:clamp(86px,11vw,160px);aspect-ratio:1;background:var(--red);right:-4%;top:10%;border-radius:50% 0 50% 50%;opacity:.94;animation:drift 8s ease-in-out 1.2s infinite alternate}.shape.yellow{width:clamp(76px,9vw,130px);aspect-ratio:1;background:var(--yellow);left:2%;bottom:-3%;border-radius:50% 50% 0 50%;opacity:.96;animation:driftReverse 9s ease-in-out 1.5s infinite alternate}.shape.green{width:clamp(48px,6vw,84px);height:31%;right:0;bottom:13%;background:var(--green);opacity:.92}
    .vertical{position:absolute;z-index:4;right:21px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;color:white;font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.25)}
    @keyframes in{to{opacity:1;transform:none}}
    @keyframes logoIn{to{opacity:1;transform:none;clip-path:inset(0 0 0 0)}}
    @keyframes cardIn{to{opacity:1;transform:none}}
    @keyframes frameIn{to{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes photoSettle{from{transform:scale(1.075)}to{transform:scale(1.035)}}
    @keyframes drift{from{transform:translate3d(0,0,0) rotate(0)}to{transform:translate3d(-14px,12px,0) rotate(7deg)}}
    @keyframes driftReverse{from{transform:translate3d(0,0,0) rotate(0)}to{transform:translate3d(12px,-10px,0) rotate(-6deg)}}
    @keyframes mobileOrbit{0%,100%{transform:translate3d(0,0,0) rotate(0)}50%{transform:translate3d(-12px,9px,0) rotate(8deg)}}
    @media(max-width:900px){.home{grid-template-columns:minmax(365px,48vw) minmax(0,1fr)}.identity{padding-left:25px;padding-right:25px}.nav-title{margin-top:clamp(26px,5vh,50px)}.vln-nav{width:min(100%,455px);height:min(35vh,315px);min-height:245px}.portrait-panel{padding-left:28px;padding-right:38px}.portrait-frame{width:88%}}
    @media(max-width:680px){
      .home{grid-template-columns:1fr;grid-template-rows:18% 42% 40%}
      .frame{inset:8px}
      .identity{display:contents}
      .logo{grid-row:1;align-self:center;width:calc(100% - 38px);max-height:15vh;margin:9px auto 0;z-index:6;animation-duration:.8s}
      .logo img{max-height:15vh;object-position:center}
      .role,.nav-title{display:none}
      .portrait-panel{grid-row:2;padding:8px 18px 10px;align-items:center;background:linear-gradient(145deg,#f3ecdf 0%,#d9b896 100%)}
      .portrait-frame{width:min(72vw,390px);height:100%;min-height:0;max-height:none;box-shadow:8px 8px 0 var(--red);transform:translateY(20px) rotate(.6deg);animation-duration:.85s}
      .portrait-frame:after{inset:8px}
      .portrait{object-position:center 16%;transform:scale(1.025);animation-duration:1.1s}
      .shape.red{width:68px;top:3%;right:-10px;animation:mobileOrbit 6s ease-in-out 1s infinite}
      .shape.yellow{width:58px;left:-10px;bottom:-7px;animation:mobileOrbit 7.5s ease-in-out 1.3s infinite reverse}
      .shape.green,.vertical{display:none}
      .vln-nav{grid-row:3;z-index:7;align-self:center;justify-self:center;width:min(calc(100% - 22px),410px);height:min(36vh,290px);min-height:235px;background:var(--ivory)}
      .vln-piece:hover,.vln-piece:focus-visible{transform:none}
      .vln-piece:active{transform:translate(2px,2px) scale(.985);filter:saturate(1.08)}
      .v-shape .label{font-size:clamp(.54rem,1.9vw,.72rem)}
      .l-shape .label{font-size:clamp(.46rem,1.62vw,.64rem)}
      .n-blue .label{font-size:clamp(.4rem,1.42vw,.54rem)}
      .n-green .label{font-size:clamp(.38rem,1.36vw,.52rem)}
    }
    @media(max-height:650px) and (min-width:681px){.identity{padding-top:22px;padding-bottom:20px}.logo{width:min(100%,610px);max-height:135px}.logo img{max-height:135px}.nav-title{margin-top:22px}.vln-nav{width:min(100%,430px);height:270px;min-height:0}.portrait-panel{padding-top:32px;padding-bottom:32px}.portrait-frame{height:calc(100dvh - 64px);min-height:0}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}.logo,.role,.vln-nav,.portrait-frame{opacity:1;transform:none;clip-path:none}.portrait{transform:none}}
  </style>
</head>
<body>
  <main class="home">
    <div class="frame" aria-hidden="true"></div>
    <section class="identity" aria-label="Identidad y áreas de trabajo">
      <div class="logo">
        <picture>
          <source srcset="assets/logo-valentina-v2.webp" type="image/webp">
          <img src="assets/Logotipo%20Bauhaus%20tipogr%C3%A1fico%20VALENTINA.png" alt="VALENTINA" loading="eager" decoding="async">
        </picture>
      </div>
      <p class="role">Valentina Galaz · Flautista · Investigadora · Directora artística</p>
      <div class="nav-title">Selecciona un área</div>
      <nav class="vln-nav" aria-label="Áreas de trabajo">
        <a class="vln-piece v-shape" href="interpretacion/" aria-label="Interpretación"><span class="label">Interpretación</span><span class="v-left"></span><span class="v-right"></span></a>
        <a class="vln-piece l-shape" href="piazzollamente/" aria-label="Piazzollamente"><span class="label">Piazzollamente</span><span class="l-vertical"></span><span class="l-horizontal"></span></a>
        <a class="vln-piece n-blue" href="investigacion/" aria-label="Investigación"><span class="label">Investigación</span><span class="n-left"></span><span class="n-diagonal"></span></a>
        <a class="vln-piece n-green" href="escuela-de-flautistas/" aria-label="Escuela de Flautistas"><span class="label">Escuela de Flautistas</span><span class="n-right"></span><span class="n-base"></span></a>
        <span class="accent circle-red" aria-hidden="true"></span>
        <span class="accent circle-blue" aria-hidden="true"></span>
      </nav>
    </section>
    <section class="portrait-panel" aria-label="Retrato de Valentina Galaz">
      <div class="portrait-frame">
        <picture>
          <source srcset="assets/valentina-home.webp" type="image/webp">
          <img class="portrait" src="assets/ChatGPT%20Image%2030%20may%202026%2C%2013_55_32%20%281%29.png" alt="Valentina Galaz sosteniendo una flauta traversa" loading="eager" decoding="async" fetchpriority="high">
        </picture>
      </div>
      <span class="shape red" aria-hidden="true"></span>
      <span class="shape yellow" aria-hidden="true"></span>
      <span class="shape green" aria-hidden="true"></span>
      <span class="vertical">Valentina Galaz</span>
    </section>
  </main>
</body>
</html>
