    <script>
      (function () {
        try {
          var originalSetItem = Storage.prototype.setItem;
          Storage.prototype.setItem = function (key, value) {
            try {
              return originalSetItem.call(this, key, value);
            } catch (error) {
              if (error && (error.name === "QuotaExceededError" || error.code === 22 || String(error).indexOf("QuotaExceeded") !== -1)) {
                try {
                  if (String(key).indexOf("cache/") === 0 || String(key).indexOf("user-") !== -1) {
                    this.removeItem(key);
                    return;
                  }
                } catch (_) {}
                return;
              }
              throw error;
            }
          };
        } catch (_) {}
      })();
    </script>
    <script type="module" crossorigin src="assets/site-valentina-galaz.js"></script>

  <body>
    <div id="root"></div>
  
<script>
document.addEventListener('click', function(event) {
  const link = event.target.closest('a[href^="#"]');
  if (!link) return;
  const target = document.querySelector(link.getAttribute('href'));
  if (!target) return;
  event.preventDefault();
  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  history.pushState(null, '', link.getAttribute('href'));
});
</script>

</body>
