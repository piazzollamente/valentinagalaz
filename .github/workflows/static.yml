name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build optimized static site
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends webp

          mkdir -p _site
          rsync -a --exclude='.git' --exclude='_site' ./ _site/

          cwebp -quiet -q 84 -m 6 -mt -sharp_yuv \
            "assets/ChatGPT Image 30 may 2026, 13_55_32 (1).png" \
            -o "_site/assets/valentina-home.webp"

          cwebp -quiet -z 9 -mt \
            "assets/Logotipo Bauhaus tipográfico VALENTINA.png" \
            -o "_site/assets/logo-valentina.webp"

          echo "Optimized image sizes:"
          du -h "_site/assets/valentina-home.webp" "_site/assets/logo-valentina.webp"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
