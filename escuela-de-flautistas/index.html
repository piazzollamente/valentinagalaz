<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Escuela de Flautistas — Valentina Galaz</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon-vg.svg?v=2">
  <link rel="shortcut icon" href="../assets/favicon-vg.svg?v=2">
  <meta name="theme-color" content="#162A52">
  <style>
    :root{--white:#fff;--blue:#162a52;--green:#18b368;--fuchsia:#e63aa7}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--white);color:var(--blue);font-family:Arial,Helvetica,sans-serif}
    body{min-height:100svh;padding:16px}
    .page{position:relative;min-height:calc(100svh - 32px);border:2px solid var(--blue);display:grid;grid-template-rows:auto 1fr;overflow:hidden;background:var(--white)}
    header{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:22px clamp(22px,4vw,54px);border-bottom:2px solid var(--blue)}
    .brand{display:block;width:min(280px,46vw)}
    .brand img{display:block;width:100%;height:auto}
    .back{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;font-weight:800;text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:4px;white-space:nowrap}
    .hero{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(300px,.92fr);min-height:0}
    .panel{position:relative;overflow:hidden;background:var(--white);color:var(--blue);padding:clamp(36px,6vw,78px);display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--blue)}
    .panel:before{content:"";position:absolute;width:clamp(120px,17vw,250px);aspect-ratio:1;background:var(--green);border-radius:50%;right:-9%;top:-14%;opacity:.96}
    .panel:after{content:"";position:absolute;width:clamp(90px,12vw,170px);aspect-ratio:1;background:var(--fuchsia);right:-4%;bottom:-10%;transform:rotate(45deg)}
    .inner{position:relative;z-index:2;border:2px solid var(--blue);padding:clamp(28px,4.5vw,56px);background:rgba(255,255,255,.94);box-shadow:12px 12px 0 var(--green)}
    .num{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;font-weight:800;color:var(--fuchsia)}
    h1{margin:22px 0 0;font-size:clamp(2.5rem,6.3vw,6.4rem);line-height:.88;letter-spacing:-.06em;text-transform:uppercase;max-width:8.8ch}
    h1 span{display:block}
    .info{padding:clamp(38px,6vw,82px);display:flex;flex-direction:column;justify-content:center;background:var(--blue);color:var(--white)}
    .eyebrow{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;font-weight:800;color:var(--green);margin:0 0 18px}
    .info p{margin:0;max-width:520px;font-size:clamp(1rem,1.45vw,1.2rem);line-height:1.7;color:rgba(255,255,255,.82)}
    .rule{width:42px;height:4px;background:var(--fuchsia);margin:28px 0 0}
    @media(max-width:760px){
      body{padding:8px}
      .page{min-height:calc(100svh - 16px)}
      header{padding:16px 18px;gap:14px}
      .brand{width:min(210px,55vw)}
      .back{font-size:.58rem;letter-spacing:.12em}
      .hero{grid-template-columns:1fr;grid-template-rows:auto auto}
      .panel{min-height:auto;padding:34px 20px 42px;border-right:0;border-bottom:2px solid var(--blue)}
      .inner{padding:28px 22px;box-shadow:8px 8px 0 var(--green)}
      h1{font-size:clamp(2.35rem,13vw,4.6rem);max-width:8.2ch}
      .info{padding:34px 24px 42px}
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <a class="brand" href="../" aria-label="Volver al inicio"><img src="../assets/Fondo%20marfil.png" alt="Valentina Galaz"></a>
      <a class="back" href="../">← Volver al inicio</a>
    </header>
    <section class="hero">
      <div class="panel">
        <div class="inner">
          <div class="num">04</div>
          <h1><span>Escuela de</span><span>Flautistas</span></h1>
        </div>
      </div>
      <div class="info">
        <p class="eyebrow">Área de formación</p>
        <p>Formación para flautistas que integra técnica, sonido, interpretación y desarrollo artístico.</p>
        <span class="rule" aria-hidden="true"></span>
      </div>
    </section>
  </main>
</body>
</html>
